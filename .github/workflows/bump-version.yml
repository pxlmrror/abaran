name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo install cargo-edit

      - run: cargo set-version --bump ${{ inputs.bump }}

      - name: Get new version
        id: version
        run: |
          VERSION=$(cargo pkgid | cut -d'#' -f2)
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock 2>/dev/null || true
          git commit -m "v${{ steps.version.outputs.value }}" || true
          git tag "v${{ steps.version.outputs.value }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.value }}"
