name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 6 * * 0'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: rust

      - run: cargo build

      - uses: github/codeql-action/analyze@v3
