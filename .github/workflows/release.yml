name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --target ${{ matrix.target }}

      - name: ClamAV scan
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            sudo apt-get update && break || sleep $((i * 10))
          done
          sudo apt-get install -y clamav
          sudo freshclam || true
          clamscan --no-summary target/${{ matrix.target }}/release/abaran || true

      - run: mv target/${{ matrix.target }}/release/abaran target/release/abaran-${{ matrix.target }}

      - uses: softprops/action-gh-release@v2
        with:
          files: target/release/abaran-*
          generate_release_notes: true
